seed: 42

runtime:
  cache_dir: caches/downloads
  checkpoint_dir: outputs/checkpoints
  log_dir: logs/runs
  log_level: INFO
  offline: false

data:
  dataset_path: outputs/artifacts/harmonized_dataset.jsonl
  split_dir: outputs/splits
  stratify_rare_min_count: 10
  train_ratio: 0.70
  validation_ratio: 0.10
  test_ratio: 0.20
  heldout_final_ratio: 0.10

labels:
  order:
    - AUTH
    - SP
    - LSD
    - CRC
    - DIS

models:
  - microsoft/mdeberta-v3-base
  - FacebookAI/xlm-roberta-base

training:
  max_length: 256
  slm_max_length: 4096
  teacher_max_new_tokens: 2048
  learning_rate: 3.0e-5
  hardware_profiles:
    HIGH_VRAM:
      batch_size: 32
      gradient_accumulation_steps: 1
      bf16_cuda: true
      fp16: false
    MID_VRAM:
      batch_size: 8
      gradient_accumulation_steps: 4
      bf16_cuda: false
      fp16: true
    LOW_VRAM:
      batch_size: 2
      gradient_accumulation_steps: 16
      bf16_cuda: false
      fp16: true
    CPU_ONLY:
      batch_size: 4
      gradient_accumulation_steps: 8
      fp32_cpu: true
  max_epochs: 6
  early_stopping_patience: 2
  eval_threshold: 0.5
  hard_gate_epoch: 3
  hard_gate_min_f1_macro: 0.65
  logging_steps: 25
  heartbeat_steps: 25
  save_strategy: steps
  eval_strategy: steps
  save_steps: 200
  eval_steps: 200
  save_total_limit: 3
  resume_from_checkpoint: true
  skip_completed_models: true

outputs:
  model_dir: outputs/results/models
  log_dir: logs/runs
